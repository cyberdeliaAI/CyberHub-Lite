services:
  cyberhub-lite:
    build: .
    container_name: cyberhub-lite
    ports:
      - "8899:8899"
    volumes:
      # Persist settings, SQLite index, and downloaded fonts (bind mount to host)
      - ./data:/app/data
      # Mount your AI image output folders (read-only)
      # Uncomment and adjust paths below:
      # - /path/to/your/outputs:/images/output1:ro
      # - /path/to/another/folder:/images/output2:ro
      # Then add /images/output1 and /images/output2 in the Settings > Gallery page.
    restart: unless-stopped